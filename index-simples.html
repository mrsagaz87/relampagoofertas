<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas Relâmpago — Promoções em tempo real</title>
    <meta name="description" content="Pegue a oferta antes que ela suma! Receba as melhores promoções da internet no WhatsApp e Telegram, todos os dias.">

    <meta property="og:title" content="Ofertas Relâmpago">
    <meta property="og:description" content="Pegue a oferta antes que ela suma!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://relampagoofertas.com.br/">
    <meta property="og:locale" content="pt_BR">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --yellow: #FFD200;
            --yellow-dark: #c8a500;
            --text: #ffffff;
            --text-dim: #9a9a9a;
            --whatsapp: #25D366;
            --whatsapp-hover: #1ea854;
            --telegram: #229ED9;
            --telegram-hover: #1a82b3;
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 10%, rgba(255, 210, 0, 0.08), transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(255, 210, 0, 0.06), transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .logo {
            margin: 0 auto 28px;
            text-align: center;
            user-select: none;
        }

        .logo-bolt {
            width: 80px;
            height: auto;
            margin: 0 auto 8px;
            display: block;
            filter:
                drop-shadow(0 0 4px #FFD200)
                drop-shadow(0 0 12px #FFD200)
                drop-shadow(0 0 24px rgba(255, 210, 0, 0.5));
            animation: glow-bolt 2.4s ease-in-out infinite;
        }

        @keyframes glow-bolt {
            0%, 100% { filter: drop-shadow(0 0 4px #FFD200) drop-shadow(0 0 12px #FFD200) drop-shadow(0 0 24px rgba(255, 210, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 6px #FFD200) drop-shadow(0 0 18px #FFD200) drop-shadow(0 0 36px rgba(255, 210, 0, 0.7)); }
        }

        .logo-text {
            font-family: 'Anton', 'Impact', 'Arial Black', sans-serif;
            line-height: 1;
            letter-spacing: 2px;
            font-weight: normal;
        }

        .logo-ofertas {
            display: block;
            font-size: clamp(52px, 14vw, 78px);
            color: #FFF8DC;
            -webkit-text-stroke: 1.5px #FFD200;
            text-shadow:
                0 0 3px #FFD200,
                0 0 8px #FFB800,
                0 0 18px rgba(255, 184, 0, 0.85),
                0 0 36px rgba(255, 184, 0, 0.5);
        }

        .logo-relampago {
            display: block;
            font-size: clamp(30px, 8vw, 44px);
            color: #E8FFF0;
            -webkit-text-stroke: 1px #4ade80;
            letter-spacing: 4px;
            text-shadow:
                0 0 3px #4ade80,
                0 0 8px #22c55e,
                0 0 18px rgba(34, 197, 94, 0.85),
                0 0 36px rgba(34, 197, 94, 0.5);
            margin-top: 12px;
        }

        h1 {
            font-size: clamp(28px, 7vw, 38px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 14px;
            letter-spacing: -0.5px;
        }

        h1 .accent {
            color: var(--yellow);
            display: block;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-dim);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .stats {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 210, 0, 0.1);
            color: var(--yellow);
            font-size: 13px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 999px;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .stats-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
            color: #ffffff;
        }

        .btn:active { transform: scale(0.98); }

        .btn-whatsapp {
            background: var(--whatsapp);
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.35);
        }
        .btn-whatsapp:hover { background: var(--whatsapp-hover); box-shadow: 0 12px 32px rgba(37, 211, 102, 0.45); }

        .btn-telegram {
            background: var(--telegram);
            box-shadow: 0 8px 24px rgba(34, 158, 217, 0.35);
        }
        .btn-telegram:hover { background: var(--telegram-hover); box-shadow: 0 12px 32px rgba(34, 158, 217, 0.45); }

        .btn svg { width: 22px; height: 22px; flex-shrink: 0; }

        .footer {
            margin-top: 36px;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="logo" role="img" aria-label="Ofertas Relâmpago">
            <svg class="logo-bolt" viewBox="0 0 80 120" fill="none" stroke="#FFD200" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M48 4 L14 70 L34 70 L24 116 L66 46 L46 46 L56 4 Z"/>
            </svg>
            <div class="logo-text">
                <span class="logo-ofertas">OFERTAS</span>

        </div>

        <h1>
            PEGUE A OFERTA

        <p class="subtitle">As melhores promoções da internet, em tempo real.</p>

        <div class="stats">

            100% GRATUITO
        </div>

            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.231-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Entrar no Canal do Telegram
        </a>

        <p class="footer">
            Entre nos nossos grupos e receba as melhores promoções todo dia, em tempo real. ⚡
        </p>
    </main>
</body>
</html>
